<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foundy | O que se perdeu, volta.</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast-container"></div>

    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">FOUNDY<span>.</span></div>
        </div>
        <div class="search-box">
            <input type="text" id="inputPesquisa" placeholder="🔍 Buscar item perdido..." onkeyup="buscarItens()">
        </div>
        <div class="nav-right" id="navRightPanel">
            <button id="btnNotificacoes" class="btn-icon" onclick="abrirModalPedidos()" style="display:none;">
                🔔 <span id="badgeNotificacao">0</span>
            </button>
            
            <div id="authArea">
                <button class="btn-outline" onclick="abrirModalAuth()">Entrar</button>
            </div>
            <button class="btn-post" onclick="abrirModalPost()">+ Achei Algo</button>
        </div>
    </nav>

    <main>
        <header class="hero">
            <h1>O que se perdeu, <span>volta.</span></h1>
            <p>Conectando a comunidade para devolver o que é importante.</p>
        </header>

        <div class="filter-bar">
            <button class="filter-btn active" onclick="filtrarCategoria('Todos')">📍 Todos</button>
            <button class="filter-btn" onclick="filtrarCategoria('Chaves')">🔑 Chaves</button>
            <button class="filter-btn" onclick="filtrarCategoria('Documentos')">📄 Documentos</button>
            <button class="filter-btn" onclick="filtrarCategoria('Eletrônicos')">📱 Eletrônicos</button>
            <button class="filter-btn" onclick="filtrarCategoria('Pets')">🐶 Pets</button>
        </div>

        <section class="map-section">
            <div class="map-container">
                <button class="btn-gps" onclick="minhaLocalizacao()">📍 Meu Local</button>
                <div id="mapaPrincipal"></div>
            </div>
        </section>

        <div class="grid-items" id="itemGrid">
            </div>
    </main>

    <div id="chat-fab" style="display: none;" onclick="toggleListaChats()">
        <span>💬</span>
        <div class="badge" id="chatBadge">0</div>
    </div>

    <div id="modalListaChats" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Suas Conversas</h3>
                <button class="close-btn" onclick="fecharModal('modalListaChats')">&times;</button>
            </div>
            <div id="listaConversas" class="chat-list-container">
                </div>
        </div>
    </div>

    <div id="modalChat" class="modal">
        <div class="modal-content chat-container">
            <div class="chat-header">
                <div class="chat-info">
                    <div class="status-dot"></div>
                    <h4 id="chatPartner">Conversa</h4>
                </div>
                <button onclick="fecharModal('modalChat')" class="close-btn">&times;</button>
            </div>
            <div id="chatMessages" class="chat-messages">
                </div>
            <div class="chat-input-area">
                <input type="text" id="msgInput" placeholder="Digite sua mensagem..." onkeypress="handleChatKey(event)">
                <button onclick="enviarMensagemReal()" class="btn-send">🚀</button>
            </div>
        </div>
    </div>

    <div id="modalPedidos" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Solicitações de Resgate</h3>
                <button class="close-btn" onclick="fecharModal('modalPedidos')">&times;</button>
            </div>
            <div id="listaPedidosPendentes" class="pedidos-scroll">
                <p class="empty-msg">Nenhuma solicitação pendente.</p>
            </div>
        </div>
    </div>

    <div id="modalPost" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Postar Item Encontrado</h3>
                <button class="close-btn" onclick="fecharModal('modalPost')">&times;</button>
            </div>
            <div class="form-group">
                <div class="upload-zone" onclick="document.getElementById('fotoItem').click()">
                    <img id="preview" src="" style="display:none;">
                    <div id="uploadPlaceholder">📸 Clique para Foto</div>
                </div>
                <input type="file" id="fotoItem" accept="image/*" onchange="analisarFoto(event)" hidden>
                
                <input type="text" id="tituloItem" placeholder="O que você encontrou?">
                <select id="categoriaItem">
                    <option value="Outros">Selecione a Categoria...</option>
                    <option value="Chaves">Chaves</option>
                    <option value="Documentos">Documentos</option>
                    <option value="Eletrônicos">Eletrônicos</option>
                    <option value="Pets">Pets</option>
                </select>

                <p class="label-small">Marque no mapa onde encontrou:</p>
                <div id="mapaPost"></div>
                <input type="hidden" id="latLogItem">
                
                <input type="text" id="perguntaSeguranca" placeholder="Pergunta (ex: Qual a marca?)">
                <button class="btn-save" onclick="salvarPost()">Publicar Agora</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
